name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (e.g.: v1.0.0)"
        required: true
        type: string

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          TAG="${TAG#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag is $TAG"

      - name: Checkout repository

        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve_tag.outputs.TAG }}
          fetch-depth: 0

      - name: Extract changelog for current version
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  build:
    name: Build
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    # environment: TAURI_KEY
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.rust_target }}
          shared-key: "reina-manager-build"

      - name: Install Mold (Linux)
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      # Linux 依赖安装 (去掉了 mold，因为上一步已经安装)
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf clang
      - name: Install dependencies
        run: pnpm install
      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version is $VERSION"
      - name: Compute short target name
        id: short
        shell: bash
        run: |
          case "${{ matrix.rust_target }}" in
            *x86_64*) SHORT=linux_amd64 ;;
            *aarch64*) SHORT=linux_arm64 ;;
            *) SHORT=unknown ;;
          esac
          echo "SHORT=$SHORT" >> $GITHUB_OUTPUT
      - name: Build and Upload to Draft Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tagName: ${{ github.ref_name }}
          tagName: ""
          # releaseName: ${{ github.ref_name }}
          releaseName: ""
          # releaseBody: ${{ needs.prepare.outputs.changelog }}
          releaseBody: ""
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          includeDebug: false
          includeRelease: true
          tauriScript: pnpm tauri
          args: --target ${{ matrix.rust_target }} # Upload build artifacts for testings
      - name: Upload deb (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ReinaManager-${{ steps.get_version.outputs.VERSION }}-${{
            steps.short.outputs.SHORT }}-deb
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
          if-no-files-found: warn
      - name: Upload rpm (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ReinaManager-${{ steps.get_version.outputs.VERSION }}-${{
            steps.short.outputs.SHORT }}-rpm
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/rpm/*.rpm
          if-no-files-found: warn
      - name: Upload AppImage (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ReinaManager-${{ steps.get_version.outputs.VERSION }}-${{
            steps.short.outputs.SHORT }}-appimage
          path: src-tauri/target/${{ matrix.rust_target
            }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          pattern: ReinaManager-*
          merge-multiple: true
      - name: Create Github Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ inputs.tag_name == '' && github.ref_name || inputs.tag_name }}
          immutableCreate: true
          body: ${{ needs.prepare.outputs.changelog }}
          artifacts: "release-artifacts/ReinaManager*.deb,release-artifacts/ReinaManager*\
            .rpm,release-artifacts/ReinaManager*.AppImage"
          makeLatest: true
